<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <!-- Background with rounded corners like Claude icon -->
  <rect width="512" height="512" rx="96" ry="96" fill="#D4745F"/>
  <!-- Starburst rays (Claude sparkle style) -->
  <g transform="translate(256, 240)" stroke="#FFF5F0" stroke-linecap="round" fill="none">
    <!-- Main rays - top is emphasized (peak!) -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke-width="22"/>
    <!-- Upper rays -->
    <line x1="0" y1="0" x2="58" y2="-103" stroke-width="18"/>
    <line x1="0" y1="0" x2="-58" y2="-103" stroke-width="18"/>
    <!-- Side rays -->
    <line x1="0" y1="0" x2="105" y2="-52" stroke-width="16"/>
    <line x1="0" y1="0" x2="-105" y2="-52" stroke-width="16"/>
    <!-- Lower side rays -->
    <line x1="0" y1="0" x2="110" y2="20" stroke-width="14"/>
    <line x1="0" y1="0" x2="-110" y2="20" stroke-width="14"/>
    <!-- Bottom rays (shorter - valley) -->
    <line x1="0" y1="0" x2="70" y2="75" stroke-width="12"/>
    <line x1="0" y1="0" x2="-70" y2="75" stroke-width="12"/>
    <line x1="0" y1="0" x2="0" y2="85" stroke-width="12"/>
  </g>
  <!-- Small clock indicator at center -->
  <circle cx="256" cy="240" r="24" fill="#D4745F" stroke="#FFF5F0" stroke-width="6"/>
  <!-- Clock hands suggesting peak time (pointing ~5-11 range) -->
  <g transform="translate(256, 240)" stroke="#FFF5F0" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="-14" stroke-width="5"/>
    <line x1="0" y1="0" x2="10" y2="-8" stroke-width="4"/>
  </g>
</svg>
